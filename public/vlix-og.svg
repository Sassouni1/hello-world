    <rect x="24" y="24" width="438" height="344" rx="24" fill="#0B0D0D" stroke="rgba(34,211,238,0.16)"/>
    <rect x="48" y="50" width="180" height="42" rx="21" fill="rgba(34,211,238,0.16)" stroke="rgba(34,211,238,0.28)"/>
