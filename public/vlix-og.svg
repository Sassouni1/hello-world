      <circle cx="31" cy="32" r="7" fill="#39E6FF"/>
      <text x="52" y="39" fill="#E9FEFF" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="850">Deploying agents</text>
      <text x="294" y="39" fill="#A8E9EE" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800">3 active</text>
      <rect x="23" y="60" width="340" height="1" fill="rgba(255,255,255,0.12)"/>
      <text x="24" y="91" fill="#F7F7F4" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">Explorer</text>
