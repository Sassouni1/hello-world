    <text x="40" y="23" fill="#A9F7FF" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800">Universal AI bridge</text>

    <text x="0" y="102" fill="#F8F8F5" font-family="Inter, Arial, sans-serif" font-size="66" font-weight="850" letter-spacing="-2.8">
