    <g transform="translate(48 124)">
      <rect width="386" height="64" rx="19" fill="rgba(255,255,255,0.07)"/>
      <text x="24" y="39" fill="#F5F5F1" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800">Send work from phone</text>
